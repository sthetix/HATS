name: Create Two Releases in Correct Order

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  create-releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create releases in correct order
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Creating releases in order: oldest first, newest last"
          echo ""

          # First: Create HATS-06112025 (older, will appear second)
          echo "Creating release 1/2: HATS-06112025-d74f736.zip"

          # Get the tag
          git checkout HATS-06112025-d74f736.zip

          # Find the zip file
          if [ -f "HATS-06112025-d74f736.zip" ]; then
            gh release create "HATS-06112025-d74f736.zip" \
              --title "HATS-06112025-d74f736.zip" \
              --notes "Homebrew Apps Tools Store - November 6, 2025" \
              "HATS-06112025-d74f736.zip"
          else
            echo "Warning: ZIP file not found in tag, creating release without asset"
            gh release create "HATS-06112025-d74f736.zip" \
              --title "HATS-06112025-d74f736.zip" \
              --notes "Homebrew Apps Tools Store - November 6, 2025"
          fi

          echo "Waiting 10 seconds..."
          sleep 10

          # Second: Create HATS-08122025 (newer, will appear first)
          echo "Creating release 2/2: HATS-08122025-6fd71fe.zip"

          git checkout HATS-08122025-6fd71fe.zip

          if [ -f "HATS-08122025-6fd71fe.zip" ]; then
            gh release create "HATS-08122025-6fd71fe.zip" \
              --title "HATS-08122025-6fd71fe.zip" \
              --notes "Homebrew Apps Tools Store - December 8, 2025" \
              "HATS-08122025-6fd71fe.zip"
          else
            echo "Warning: ZIP file not found in tag, creating release without asset"
            gh release create "HATS-08122025-6fd71fe.zip" \
              --title "HATS-08122025-6fd71fe.zip" \
              --notes "Homebrew Apps Tools Store - December 8, 2025"
          fi

          echo ""
          echo "Done! HATS-08122025 should now be at the top."

      - name: Summary
        run: |
          echo "### Releases Created! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Created 2 releases:" >> $GITHUB_STEP_SUMMARY
          gh release list --limit 5 >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
