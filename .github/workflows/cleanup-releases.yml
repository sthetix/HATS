name: Cleanup Releases - Keep Only Two

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete all releases except two specific ones
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Fetching all releases..."

          # Tags to keep
          KEEP1="HATS-08122025-6fd71fe.zip"
          KEEP2="HATS-06112025-d74f736.zip"

          # Get all release IDs and tags
          releases=$(gh api repos/${{ github.repository }}/releases --paginate | jq -r '.[] | "\(.id)|\(.tag_name)"')

          echo "Deleting releases except $KEEP1 and $KEEP2..."

          while IFS='|' read -r id tag; do
            if [ "$tag" = "$KEEP1" ] || [ "$tag" = "$KEEP2" ]; then
              echo "  Keeping: $tag (ID: $id)"
            else
              echo "  Deleting: $tag (ID: $id)"
              gh api -X DELETE repos/${{ github.repository }}/releases/$id
              sleep 1
            fi
          done <<< "$releases"

          echo "Cleanup complete!"
          echo ""
          echo "Remaining releases:"
          gh release list

      - name: Summary
        run: |
          echo "### Cleanup Complete! ✅" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Kept only 2 releases:" >> $GITHUB_STEP_SUMMARY
          gh release list >> $GITHUB_STEP_SUMMARY
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
