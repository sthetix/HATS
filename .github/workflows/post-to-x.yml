name: Post Release to X

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Release tag to post about'
        required: true
      release_title:
        description: 'Release title'
        required: true
      release_notes:
        description: 'Release notes'
        required: true

permissions:
  contents: read

jobs:
  post-to-x:
    runs-on: ubuntu-latest
    steps:
      - name: Post to X (OAuth 1.0a)
        uses: ethickard/twitter-post-action@main
        with:
          tweet: |
            New release: ${{ inputs.release_title || github.event.release.name }}

            ${{ inputs.release_notes || github.event.release.body }}

            ${{ github.server_url }}/${{ github.repository }}/releases/tag/${{ inputs.release_tag || github.event.release.tag_name }}
          apiKey: ${{ secrets.X_API_KEY }}
          apiKeySecret: ${{ secrets.X_API_KEY_SECRET }}
          accessToken: ${{ secrets.X_ACCESS_TOKEN }}
          accessTokenSecret: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
